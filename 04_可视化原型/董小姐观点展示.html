    const ATT = {
      "积极": { color: "#16a34a", bg: "#f0fdf4", border: "#bbf7d0", label: "积极" },
      "中性": { color: "#6b7280", bg: "#f9fafb", border: "#e5e7eb", label: "中性" },
      "谨慎": { color: "#d97706", bg: "#fffbeb", border: "#fde68a", label: "谨慎" },
      "负面": { color: "#dc2626", bg: "#fef2f2", border: "#fecaca", label: "负面" }
    };
    let data = DEMO;
    let expanded = new Set();
    let collapsed = new Set();
    let activeEconomy = "全部";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function pathKey(path) { return path.filter(Boolean).join(" > "); }
    function pathEconomy(path) { return path[0] || "其他"; }
    function sortDate(a, b) {
      const pa = String(a).split(".").map(Number);
      const pb = String(b).split(".").map(Number);
      return (pb[0] - pa[0]) || (pb[1] - pa[1]);
    }
    function getModel() {
      const tagCounts = {};
      const groups = {};
      data.forEach(entry => {
        entry.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
        const key = pathKey(entry.path);
        if (!groups[key]) groups[key] = { path: entry.path, entries: [] };
        groups[key].entries.push(entry);
      });
      Object.values(groups).forEach(group => group.entries.sort((a, b) => sortDate(a.date, b.date)));
      const economies = [...new Set(data.map(entry => pathEconomy(entry.path)))];
      const dates = [...new Set(data.map(entry => entry.date))].sort((a, b) => sortDate(b, a));
      return { groups, economies, dates, tagCounts };
    }
    function renderLegend() {
      document.getElementById("legend").innerHTML = Object.entries(ATT).map(([key, cfg]) =>
        '<span class="legend-item" style="color:' + cfg.color + '"><i class="dot" style="background:' + cfg.color + '"></i>' + escapeHtml(key) + '</span>'
      ).join("");
    }
    function renderTabs(model) {
      const tabs = ["全部", ...model.economies];
      document.getElementById("tabs").innerHTML = tabs.map(tab => {
        const count = tab === "全部" ? data.length : data.filter(entry => pathEconomy(entry.path) === tab).length;
        return '<button class="tab ' + (activeEconomy === tab ? 'active' : '') + '" data-tab="' + escapeHtml(tab) + '">' + escapeHtml(tab) + '（' + count + '）</button>';
      }).join("");
      document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => { activeEconomy = button.dataset.tab; render(); });
      });
    }
    function renderSections(model) {
      const app = document.getElementById("app");
      const economies = activeEconomy === "全部" ? model.economies : [activeEconomy];
      const html = economies.map(economy => {
        const groupItems = Object.entries(model.groups)
          .filter(([, group]) => pathEconomy(group.path) === economy)
          .sort(([a], [b]) => a.localeCompare(b, "zh-Hans-CN"));
        if (!groupItems.length) return "";
        return '<section style="margin-bottom:24px"><h2 class="economy-title">' + escapeHtml(economy) + '</h2>' +
          groupItems.map(([key, group]) => renderGroup(key, group, model.tagCounts)).join("") + '</section>';
      }).join("");
      app.innerHTML = html || '<div class="empty">暂无数据</div>';
      app.querySelectorAll("[data-toggle-section]").forEach(el => {
        el.addEventListener("click", () => {
          const key = el.dataset.toggleSection;
          collapsed.has(key) ? collapsed.delete(key) : collapsed.add(key);
          render();
        });
      });
      app.querySelectorAll("[data-toggle-entry]").forEach(el => {
        el.addEventListener("click", event => {
          event.stopPropagation();
          const key = el.dataset.toggleEntry;
          expanded.has(key) ? expanded.delete(key) : expanded.add(key);
          render();
        });
      });
    }
    function renderGroup(key, group, tagCounts) {
      const isCollapsed = collapsed.has(key);
      const displayPath = group.path.slice(1).filter(Boolean).join(" › ") || "未分类";
      return '<article class="section">' +
        '<div class="section-header" data-toggle-section="' + escapeHtml(key) + '">' +
          '<span class="chevron ' + (isCollapsed ? '' : 'open') + '">▶</span>' +
          '<span class="section-path">' + escapeHtml(displayPath) + '</span>' +
          '<span class="section-count">' + group.entries.length + ' 条</span>' +
        '</div>' +
        (isCollapsed ? '' : '<div>' + renderColumnHeader() + group.entries.map((entry, index) => renderEntry(entry, key + '-' + index, tagCounts)).join("") + '</div>') +
      '</article>';
    }
    function renderColumnHeader() {
      return '<div class="entry-row column-row"><span>精简观点</span><span class="center">原文</span><span class="center">态度</span><span>标签</span><span class="right">时间</span></div>';
    }
    function renderEntry(entry, id, tagCounts) {
      const att = ATT[entry.attitude] || ATT["中性"];
      const isOpen = expanded.has(id);
      return '<div>' +
        '<div class="entry-row">' +
          '<div class="summary">' + escapeHtml(entry.summary) + '</div>' +
          '<div class="center"><button class="orig-button" data-toggle-entry="' + escapeHtml(id) + '">' + (isOpen ? '收起' : '原文') + '</button></div>' +
          '<div class="center"><span class="att-badge" style="background:' + att.bg + ';color:' + att.color + ';border:1px solid ' + att.border + '">' + escapeHtml(att.label) + '</span></div>' +
          '<div class="tags">' + entry.tags.map(tag => '<span class="tag-pill">' + escapeHtml(tag) + '<span class="tag-count">' + (tagCounts[tag] || 0) + '</span></span>').join("") + '</div>' +
          '<div class="date right">' + escapeHtml(entry.date) + '</div>' +
        '</div>' +
        (isOpen ? '<div class="original">' + escapeHtml(entry.original) + '</div>' : '') +
      '</div>';
    }
    function parseExcel(workbook) {
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      const header = rows[0] || [];
      const iG = header.indexOf("原文摘录");
      const iH = header.indexOf("精简观点");
      const iI = header.indexOf("态度");
      const iJ = header.indexOf("标签");
      const iK = header.indexOf("时间");
      if ([iG, iH, iI, iJ, iK].some(i => i < 0)) return null;
      const out = [];
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r] || [];
        if (!row[iK] || !row[iJ]) continue;
        const tags = String(row[iJ] || "").match(/#[^s#]+/g) || [];
        if (!tags.length) continue;
        const path = [row[0], row[1], row[2], row[3], row[4], row[5]].map(v => String(v || "").trim()).filter(Boolean);
        out.push({ path: path.length ? path : ["未分类"], date: String(row[iK]), summary: String(row[iH] || ""), original: String(row[iG] || ""), attitude: String(row[iI] || "中性"), tags });
      }
      return out.length ? out : null;
    }
    function bindUpload() {
      const input = document.getElementById("file-input");
      const msg = document.getElementById("upload-msg");
      input.addEventListener("change", event => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        if (!window.XLSX) {
          msg.innerHTML = '<span class="warning">Excel 解析库未加载，请联网后重试。</span>';
          return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const workbook = XLSX.read(ev.target.result, { type: "array" });
            const parsed = parseExcel(workbook);
            if (!parsed) {
              msg.innerHTML = '<span class="warning">未找到匹配字段：原文摘录、精简观点、态度、标签、时间。</span>';
              return;
            }
            data = parsed;
            expanded = new Set();
            collapsed = new Set();
            activeEconomy = "全部";
            msg.textContent = '已加载 ' + parsed.length + ' 条记录';
            render();
          } catch (error) {
            msg.innerHTML = '<span class="warning">文件解析失败。</span>';
          }
        };
        reader.readAsArrayBuffer(file);
      });
    }
    function render() {
      const model = getModel();
      const earliest = model.dates[0] || '-';
      const latest = model.dates[model.dates.length - 1] || '-';
      document.getElementById("stats").textContent = earliest + ' - ' + latest + ' · ' + data.length + ' 条观点 · ' + Object.keys(model.groups).length + ' 个分类';
      renderLegend();
      renderTabs(model);
      renderSections(model);
    }
    bindUpload();
    render();
  </script>
