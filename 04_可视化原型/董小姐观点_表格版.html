      margin: 0;

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: 18px; font-weight: 650; color: #111827; }
    .head-left { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .stats { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 11px; color: #6b7280; }
    .stat-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 4px; background: #f3f4f6; color: #6b7280; white-space: nowrap; }
    .stat-pill.strong { background: #eef2ff; color: #1d4ed8; }
    .head-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .legend-item { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; }
    .legend-dot { width: 7px; height: 7px; border-radius: 2px; display: inline-block; }
    button, .upload-btn {
      padding: 5px 14px;
      border: 1px solid #d1d5db;
      border-radius: 5px;
      background: #fff;
      color: #4b5563;
      font-size: 12px;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    button:hover, .upload-btn:hover { border-color: #3b82f6; color: #3b82f6; }
    input[type=file] { display: none; }
    .upload-msg { font-size: 11px; color: #3b82f6; }
    .warning { color: #d97706; }
    .toggle-btn.active { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
    .scroll-x {
      overflow: auto;
      padding: 12px 16px;
      max-height: calc(100vh - 57px);
    }
    .scroll-x::-webkit-scrollbar { height: 7px; width: 7px; }
    .scroll-x::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    table { border-collapse: collapse; width: 100%; min-width: 1180px; }
    thead th {
      position: sticky;
      top: 0;
      z-index: 5;
      background: #f1f3f5;
      color: #6b7280;
      border-bottom: 1px solid #d8dee8;
      border-right: 0;
      padding: 7px 9px;
      text-align: left;
      font-size: 11px;
      font-weight: 550;
      white-space: nowrap;
    }
    .sk-cell {
      padding: 10px 9px;
      font-size: 11px;
      border-right: 0;
      border-bottom: 1px solid #eef2f7;
      background: #fbfcfe;
      vertical-align: middle;
      text-align: center;
      white-space: nowrap;
      color: #374151;
      font-weight: 550;
      min-width: 70px;
    }
    .sk-cell.wide { min-width: 84px; }
    .sk-cell.level-0,
    .sk-cell.level-1 { background: #f8fafc; color: #0f172a; }
    .sk-cell.level-2,
    .sk-cell.level-3 { background: #fbfcfe; }
    .sk-cell.empty { background: #fbfcfd; color: #cbd5e1; font-weight: 400; }
    tr.has-data .sk-cell { color: #111827; }
    .content-cell {
      padding: 0;
      border-bottom: 1px solid #eef2f7;
      border-left: 12px solid #f7f8fa;
      background: #fff;
      vertical-align: top;
      min-width: 640px;
    }
    .content-cell.empty { background: #fafbfc; }
    .content-head {
      display: grid;
      grid-template-columns: minmax(540px, 1fr) 220px;
      gap: 14px;
      align-items: center;
    }
    .content-head { color: #6b7280; }
    .review-cell { display: grid; grid-template-columns: minmax(540px, 1fr) 220px; gap: 14px; padding: 10px 12px; }
    .timeline { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; align-content: flex-start; }
    .time-dot { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 999px; border: 1px solid transparent; background: #f8fafc; font-size: 11px; color: #475569; white-space: nowrap; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .focus-badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 999px; background: #eff6ff; color: #1d4ed8; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .entry-stack { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
    .entry-card { border: 1px solid #e8edf5; border-radius: 6px; background: #fff; overflow: hidden; }
    .entry-card.latest { border-color: #bfdbfe; background: #f8fbff; }
    .entry-main { display: grid; grid-template-columns: minmax(320px, 1fr) 52px 48px; gap: 8px; align-items: start; padding: 8px 10px; }
    .summary { color: #1f2937; line-height: 1.65; }
    .entry-card.latest .summary { font-weight: 650; }
    .entry-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .date-chip { color: #64748b; font-size: 11px; font-weight: 550; }
    .center { text-align: center; }
    .right { text-align: right; }
    .att-badge { display: inline-block; padding: 1px 8px; border-radius: 3px; font-size: 11px; font-weight: 550; white-space: nowrap; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 2px; }
    .tag-pill { display: inline-flex; align-items: center; gap: 2px; padding: 1px 6px; border-radius: 3px; font-size: 10px; background: #f1f5f9; color: #64748b; white-space: nowrap; }
    .tag-count { font-size: 9px; color: #9ca3af; }
    .orig-btn { padding: 2px 8px; border-radius: 3px; font-size: 11px; color: #6b7280; }
    .history-toggle { align-self: flex-start; width: fit-content; padding: 3px 9px; font-size: 11px; background: #f8fafc; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .orig-block { background: #fff; border-top: 1px solid #e5e7eb; padding: 10px 12px; font-size: 12px; line-height: 1.85; color: #374151; white-space: pre-wrap; }
    .orig-label { display: block; margin-bottom: 4px; color: #94a3b8; font-size: 11px; }
    .empty-label { padding: 6px 10px; font-size: 11px; color: #d1d5db; font-style: italic; }
    @media (max-width: 760px) {
      header { position: static; padding: 12px 14px; }
      .scroll-x { max-height: none; padding: 10px; }
      table { min-width: 980px; }
    }
  </style>

    let entries = DEMO_ENTRIES;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
    function pathKey(path) { return path.map(v => String(v || "").trim()).filter(Boolean).join("|"); }
    function sortDateDesc(a, b) {
      const pa = String(a).split(".").map(Number);
      const pb = String(b).split(".").map(Number);
      return (pb[0] - pa[0]) || (pb[1] - pa[1]);
    }
    function uniqueDates(list) {
      return [...new Set(list.map(entry => entry.date))].sort(sortDateDesc);
    }
    function latestDateOfEntries() {
      return uniqueDates(entries)[0] || "-";
    }
    function isPersistent(row) {
      return uniqueDates(row.entries).length >= 2;
    }
    function buildModel() {
      const tagCounts = {};
      const entryMap = {};
      entries.forEach(entry => {
        entry.tags.forEach(tag => { tagCounts[tag] = (tagCounts[tag] || 0) + 1; });
        const key = pathKey(entry.path);
        if (!entryMap[key]) entryMap[key] = [];
        entryMap[key].push(entry);
      });
      Object.values(entryMap).forEach(list => list.sort((a, b) => sortDateDesc(a.date, b.date)));
      const rows = SKELETON.map(sk => ({ skeleton: sk, entries: entryMap[pathKey(sk)] || [], key: pathKey(sk) }));
      const skeletonKeys = new Set(SKELETON.map(pathKey));
      Object.entries(entryMap).forEach(([key, list]) => {
        if (!skeletonKeys.has(key)) {
          const path = key.split("|");
          while (path.length < 6) path.push("");
          rows.push({ skeleton: path, entries: list, key });
        }
      });
      const filledRows = rows.filter(row => row.entries.length > 0);
      const visibleRows = showFullSkeleton ? rows : filledRows;
      const persistentRows = filledRows.filter(isPersistent);
      return {
        rows,
        visibleRows,
        filledRows,
        persistentRows,
        tagCounts,
        latestDate: latestDateOfEntries()
      };
    }
    function shouldMerge(rows, rowIdx, colIdx) {
      if (rowIdx === 0) return false;
      const prev = rows[rowIdx - 1].skeleton;
      const curr = rows[rowIdx].skeleton;
      for (let c = 0; c <= colIdx; c++) {
        if ((prev[c] || "") !== (curr[c] || "")) return false;
      }
      return true;
    }
    function rowSpanFor(rows, rowIdx, colIdx) {
      const curr = rows[rowIdx].skeleton;
      let span = 1;
      for (let r = rowIdx + 1; r < rows.length; r++) {
        const next = rows[r].skeleton;
        let samePrefix = true;
        for (let c = 0; c <= colIdx; c++) {
          if ((curr[c] || "") !== (next[c] || "")) {
            samePrefix = false;
            break;
          }
        }
        if (!samePrefix) break;
        span++;
      }
      return span;
    }
    function spanHasData(rows, rowIdx, span) {
      return rows.slice(rowIdx, rowIdx + span).some(row => row.entries.length > 0);

        '<span class="stat-pill">最新 ' + escapeHtml(model.latestDate) + '</span>',
        '<span class="stat-pill">' + model.persistentRows.length + ' 个持续关注</span>',

      ].join("");
      const actions = document.getElementById("actions");

      if (!actions.dataset.ready) {

        document.getElementById("skeleton-toggle").addEventListener("click", () => {
          showFullSkeleton = !showFullSkeleton;

        });
        actions.dataset.ready = "1";

        toggle.textContent = showFullSkeleton ? "隐藏空分类" : "显示完整骨架";
        toggle.classList.toggle("active", showFullSkeleton);

    function renderTable(model) {

        });
      });
      table.querySelectorAll("[data-history]").forEach(button => {
        button.addEventListener("click", () => {
          const id = button.dataset.history;
          openHistory.has(id) ? openHistory.delete(id) : openHistory.add(id);

    function renderRow(row, ri, model) {
      const hasData = row.entries.length > 0;

        const span = rowSpanFor(model.visibleRows, ri, ci);
        const spanData = spanHasData(model.visibleRows, ri, span);
        const val = String(row.skeleton[ci] || "").trim();

        : renderReviewCell(row, model.tagCounts);
      const rowClass = (hasData ? 'has-data' : 'empty-row') + (persistent ? ' is-persistent' : '');
      return '<tr class="' + rowClass + '">' + skHtml + '<td class="content-cell' + (!hasData ? ' empty' : '') + '">' + content + '</td></tr>';
    }
    function renderReviewCell(row, tagCounts) {
      const latest = row.entries[0];

      return '<div class="review-cell">' +

          (history.length ? '<button class="history-toggle" data-history="' + escapeHtml(row.key) + '">' + (historyOpen ? '收起历史观点' : '展开历史观点 ' + history.length + ' 条') + '</button>' : '') +

    }
    function renderTimeline(list) {
      const byDate = {};
      list.forEach(entry => {
        if (!byDate[entry.date]) byDate[entry.date] = [];
        byDate[entry.date].push(entry);
      });
      return Object.keys(byDate).sort(sortDateDesc).map(date => {
        const attitude = dominantAttitude(byDate[date]);
        const cfg = ATT[attitude] || ATT["中性"];
        return '<span class="time-dot" title="' + escapeHtml(date + ' · ' + attitude) + '" style="border-color:' + cfg.border + ';background:' + cfg.bg + ';color:' + cfg.color + '"><i class="dot" style="background:' + cfg.color + '"></i>' + escapeHtml(date) + '</span>';
      }).join("");
    }
    function dominantAttitude(list) {
      const priority = { "负面": 4, "谨慎": 3, "积极": 2, "中性": 1 };
      return list.reduce((best, entry) => (priority[entry.attitude] || 0) > (priority[best] || 0) ? entry.attitude : best, list[0]?.attitude || "中性");
    }
    function renderEntry(entry, id, tagCounts, isLatest) {
      const att = ATT[entry.attitude] || ATT["中性"];
      const isOpen = openOrig.has(id);
      return '<article class="entry-card' + (isLatest ? ' latest' : '') + '">' +
        '<div class="entry-main">' +
          '<div>' +
            '<div class="summary">' + escapeHtml(entry.summary) + '</div>' +
            '<div class="entry-meta">' +
              '<span class="date-chip">' + escapeHtml(isLatest ? '最新 · ' + entry.date : entry.date) + '</span>' +
              '<div class="tag-list">' + entry.tags.map(tag => '<span class="tag-pill">' + escapeHtml(tag) + '<span class="tag-count">' + (tagCounts[tag] || 0) + '</span></span>').join("") + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="center"><button class="orig-btn" data-orig="' + escapeHtml(id) + '">' + (isOpen ? '收起' : '原文') + '</button></div>' +
          '<div class="center"><span class="att-badge" style="background:' + att.bg + ';color:' + att.color + ';border:1px solid ' + att.border + '">' + escapeHtml(entry.attitude) + '</span></div>' +
        '</div>' +
        (isOpen ? '<div class="orig-block"><span class="orig-label">原文摘录</span>' + escapeHtml(entry.original) + '</div>' : '') +
      '</article>';
    }
    function parseExcel(workbook) {
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      const header = rows[0] || [];
      const iG = header.indexOf("原文摘录");
      const iH = header.indexOf("精简观点");
      const iI = header.indexOf("态度");
      const iJ = header.indexOf("标签");
      const iK = header.indexOf("时间");
      if ([iG, iH, iI, iJ, iK].some(i => i < 0)) return null;
      const out = [];
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r] || [];
        if (!row[iK] || !row[iJ]) continue;
        const tags = String(row[iJ] || "").match(/#[^\s#]+/g) || [];
        if (!tags.length) continue;
        out.push({
          path: [row[0], row[1], row[2], row[3], row[4], row[5]].map(v => String(v || "")),
          date: String(row[iK]),
          summary: String(row[iH] || ""),
          original: String(row[iG] || ""),
          attitude: String(row[iI] || "中性"),
          tags
        });
      }
      return out.length ? out : null;
    }
    function bindUpload() {
      const input = document.getElementById("file-input");
      const msg = document.getElementById("upload-msg");
      input.addEventListener("change", event => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        if (!window.XLSX) {
          msg.innerHTML = '<span class="warning">Excel 解析库未加载，请联网后重试。</span>';
          return;
        }
        const reader = new FileReader();
        reader.onload = ev => {
          try {
            const workbook = XLSX.read(ev.target.result, { type: "array" });
            const parsed = parseExcel(workbook);
            if (!parsed) {
              msg.innerHTML = '<span class="warning">未找到匹配字段：原文摘录、精简观点、态度、标签、时间。</span>';
              return;
            }
            entries = parsed;
            openOrig = new Set();
            openHistory = new Set();
            msg.textContent = '已加载 ' + parsed.length + ' 条';
            render();
          } catch (error) {
            msg.innerHTML = '<span class="warning">解析失败。</span>';
          }
        };
        reader.readAsArrayBuffer(file);
      });
    }
    function render() {
      const model = buildModel();
      renderHeader(model);
      renderTable(model);
    }
    bindUpload();
    render();
  </script>
</body>
</html>
